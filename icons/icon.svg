<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4dd0e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2ebf2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcedc8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)" />

  <!-- Subtle inner glow ring -->
  <rect x="16" y="16" width="480" height="480" rx="82" ry="82" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="6" />

  <!-- Bar chart (3 bars on a baseline) -->
  <!-- Baseline -->
  <rect x="110" y="340" width="292" height="8" rx="4" fill="rgba(255,255,255,0.35)" />

  <!-- Bar 1 (short) -->
  <rect x="128" y="260" width="70" height="80" rx="10" fill="url(#barGrad2)" opacity="0.9" />

  <!-- Bar 2 (tallest) -->
  <rect x="221" y="165" width="70" height="175" rx="10" fill="url(#barGrad1)" />

  <!-- Bar 3 (medium) -->
  <rect x="314" y="215" width="70" height="125" rx="10" fill="url(#barGrad3)" opacity="0.9" />

  <!-- Trend line over bars -->
  <polyline
    points="163,255 256,158 349,208"
    fill="none"
    stroke="rgba(255,255,255,0.85)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="0"
  />

  <!-- Trend dots -->
  <circle cx="163" cy="255" r="10" fill="white" opacity="0.9"/>
  <circle cx="256" cy="158" r="10" fill="white" />
  <circle cx="349" cy="208" r="10" fill="white" opacity="0.9"/>

  <!-- Coin at top-right corner -->
  <circle cx="390" cy="122" r="46" fill="url(#coinGrad)" />
  <circle cx="390" cy="122" r="38" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4" />
  <!-- £ or currency sign -->
  <text x="390" y="136" font-family="Georgia, serif" font-size="42" font-weight="bold" text-anchor="middle" fill="white" opacity="0.95">£</text>
</svg>
