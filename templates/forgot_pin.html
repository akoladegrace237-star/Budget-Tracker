{% extends "base.html" %}
{% block title %}Reset PIN — Budget Tracker{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">🔐</div>
        <h1 class="auth-title">Reset Your PIN</h1>
        <p class="auth-subtitle">Answer your security question to set a new PIN</p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/forgot-pin" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="security_answer">What is your favourite colour?</label>
                <input type="text" id="security_answer" name="security_answer" placeholder="Your answer" required>
            </div>
            <div class="form-group">
                <label for="new_pin">New 4-Digit PIN</label>
                <input type="password" id="new_pin" name="new_pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4"
                       placeholder="e.g. 1234" required>
            </div>
            <div class="form-group">
                <label for="confirm_pin">Confirm New PIN</label>
                <input type="password" id="confirm_pin" name="confirm_pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4"
                       placeholder="Re-enter PIN" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Reset PIN</button>
        </form>

        <p class="auth-switch"><a href="/login">Back to Sign In</a></p>
    </div>
</div>
{% endblock %}
