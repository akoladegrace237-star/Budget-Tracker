{% extends "base.html" %}
{% block title %}Login — Budget Tracker{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">💰</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required
                       value="{{ remembered_user }}" {% if not remembered_user %}autofocus{% endif %}>
            </div>
            <div class="form-group">
                <label for="pin">PIN</label>
                <input type="password" id="pin" name="pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4"
                       placeholder="4-digit PIN" required {% if remembered_user %}autofocus{% endif %}>
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:0.5rem;">
                <input type="checkbox" id="remember" name="remember" value="1"
                       {% if remembered_user %}checked{% endif %}>
                <label for="remember" style="margin:0;font-weight:normal;">Remember my username</label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-switch"><a href="/forgot-pin">Forgot your PIN?</a></p>
        <p class="auth-switch">Don't have an account? <a href="/register">Register here</a></p>
    </div>
</div>
{% endblock %}
