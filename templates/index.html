{% extends "base.html" %}
{% block title %}Budget Tracker — Sign In{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">💰</div>
        <h1 class="auth-title">Budget Tracker</h1>
        <p class="auth-subtitle">Your Personal Finance Manager</p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <div class="remember-row">
                <label class="remember-label">
                    <input type="checkbox" id="rememberMe"> Remember my username
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="/register">Register here</a></p>

<script>
(function() {
    const saved = localStorage.getItem('rememberedUsername');
    const usernameEl = document.getElementById('username');
    const rememberEl = document.getElementById('rememberMe');
    if (saved && usernameEl) {
        usernameEl.value = saved;
        rememberEl.checked = true;
    }
    document.getElementById('loginForm').addEventListener('submit', function() {
        if (rememberEl.checked) {
            localStorage.setItem('rememberedUsername', usernameEl.value);
        } else {
            localStorage.removeItem('rememberedUsername');
        }
    });
})();
</script>
    </div>
</div>
{% endblock %}
